# <summary>
# GitHub Actions workflow for validating CapRover One-Click Apps.
# Added 'workflow_dispatch' to allow manual triggering from the GitHub UI, 
# which is the best way to force an initial run and resolve 'no status' badges.
# </summary>
name: Validate One Click Apps

on:
    push:
        branches: 
            - master
    pull_request:
        branches: 
            - master
    workflow_dispatch:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            # <summary>
            # Checks out the repository code.
            # </summary>
            - name: Checkout repository
              uses: actions/checkout@v4

            # <summary>
            # Sets up Node.js v20 and npm caching.
            # </summary>
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            # <summary>
            # Installs dependencies using clean install.
            # </summary>
            - name: Install dependencies
              run: npm ci

            # <summary>
            # Executes the validation script.
            # </summary>
            - name: Validate Apps
              run: npm run validate_apps && npm run formatter
              env:
                  GITHUB_PERSONAL_TOKEN: ${{secrets.GITHUB_PERSONAL_TOKEN}}