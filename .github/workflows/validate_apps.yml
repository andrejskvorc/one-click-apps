# <summary>
# GitHub Actions workflow for validating CapRover One-Click Apps.
# Updated to resolve Node.js 20 deprecation warnings by forcing actions to run on Node 24.
# </summary>
name: Validate One Click Apps

on:
    push:
        branches: 
            - master
    pull_request:
        branches: 
            - master
    workflow_dispatch:

# <summary>
# Global environment variables for the workflow.
# Forces underlying GitHub Actions to use Node.js 24 instead of the deprecated Node.js 20.
# </summary>
env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            # <summary>
            # Checks out the repository code.
            # </summary>
            - name: Checkout repository
              uses: actions/checkout@v4

            # <summary>
            # Sets up Node.js environment using version 24 and configures npm caching.
            # </summary>
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'npm'

            # <summary>
            # Installs dependencies using clean install.
            # </summary>
            - name: Install dependencies
              run: npm ci

            # <summary>
            # Executes the validation and formatting scripts.
            # </summary>
            - name: Validate Apps
              run: npm run validate_apps && npm run formatter
              env:
                  GITHUB_PERSONAL_TOKEN: ${{secrets.GITHUB_PERSONAL_TOKEN}}