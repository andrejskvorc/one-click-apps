name: Auto-Generate Index HTML

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run HTML Generation Script
        run: node scripts/generate-index.js

      - name: Commit Generated HTML
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-generated public/index.html from YAML files"
          file_pattern: public/index.html