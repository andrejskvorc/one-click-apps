# <summary>
# GitHub Actions workflow for publishing CapRover One-Click Apps.
# The Node 24 environment variable is now placed explicitly at the job level
# to guarantee it overwrites default v4 action settings.
# </summary>
name: Publish One Click Apps

on:
    push:
        branches:
            - master
    workflow_dispatch:

jobs:
    publish:
        runs-on: ubuntu-latest
        
        # <summary>
        # Job-level permissions and environment variables.
        # contents: write is required for the push to gh-pages.
        # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 removes the deprecation warning.
        # </summary>
        permissions:
            contents: write
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Publish Apps
              run: npm run publish
              env:
                  GITHUB_PERSONAL_TOKEN: x-access-token:${{ secrets.GITHUB_TOKEN }}