# <summary>
# Standalone MeshCentral deployment for CapRover.
# Optimized for Nginx Reverse Proxy with automated SSL certificate fetching via CERTURL.
# Starts with 0 instances to allow manual configuration of HTTPS and WebSockets.
# </summary>
captainVersion: 4

services:
    # <summary>
    # Main MeshCentral web application container.
    # </summary>
    $$cap_appname:
        image: ghcr.io/ylianst/meshcentral:latest
        # <summary>Starts with 0 instances so you can enable HTTPS first</summary>
        instanceCount: 0
        environment:
            NODE_ENV: 'production'
            DYNAMIC_CONFIG: 'true'
            HOSTNAME: '$$cap_appname.$$cap_root_domain'

            # <summary>Fetches the public Let's Encrypt cert from CapRover automatically</summary>
            CERTURL: 'https://$$cap_appname.$$cap_root_domain'

            # <summary>Standard proxy settings for CapRover Nginx</summary>
            REVERSE_PROXY: 'true'
            REVERSE_PROXY_TLS_PORT: '443'

            # <summary>Internal port 80 to match Nginx default forwarding</summary>
            PORT: '80'
            TLSOFFLOAD: 'true'

            USE_MONGODB: 'false'
            ADMIN_ACCOUNT: '$$cap_admin_user'
            ADMIN_PASSWORD: '$$cap_admin_pass'
        volumes:
            - $$cap_appname-data:/opt/meshcentral/meshcentral-data
            - $$cap_appname-files:/opt/meshcentral/meshcentral-files
            - $$cap_appname-backup:/opt/meshcentral/meshcentral-backups
        restart: always

volumes:
    $$cap_appname-data:
    $$cap_appname-files:
    $$cap_appname-backup:

caproverOneClickApp:
    displayName: 'MeshCentral (Nginx SSL Optimized)'
    description: 'Standalone MeshCentral server starting in a safe stopped state for SSL configuration.'
    documentation: 'https://meshcentral.com/docs/MeshCentral2UserGuide.pdf'
    variables:
        - id: '$$cap_admin_user'
          label: 'Admin username'
          defaultValue: 'admin'
          validRegex: '/^.+$/'
        - id: '$$cap_admin_pass'
          label: 'Admin password'
          description: 'Set the initial MeshCentral admin password'
          validRegex: '/^.+$/'
    instructions:
        start: >-
            This app will be created but NOT started. This allows you to set up SSL and WebSockets safely.
        end: >-
            APP CREATED SUCCESSFULLY (NEXT STEPS):
            1. Go to Apps > $$cap_appname > HTTP Settings.
            2. Click "Enable HTTPS" and check "Force HTTPS".
            3. Check "Enable WebSocket Support".
            4. Ensure "Container HTTP Port" is set to 80.
            5. Go to "App Configs" tab.
            6. Change "Deployment Instance Count" from 0 to 1.
            7. Click "Save & Update". 
            Your MeshCentral will now start with the correct Let's Encrypt certificates.
