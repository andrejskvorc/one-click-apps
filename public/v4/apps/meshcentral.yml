captainVersion: 4

services:
    $$cap_appname:
        image: ghcr.io/ylianst/meshcentral:latest
        containerHttpPort: 80
        instanceCount: 1

        environment:
            NODE_ENV: production
            DYNAMIC_CONFIG: 'true'

            # Core settings
            HOSTNAME: $$cap_appname.$$cap_root_domain
            PORT: '80'

            # 🔥 KLJUČNO (ispravno)
            TLSOFFLOAD: '127.0.0.1'

            # Domain + SSL
            CERTURL: https://$$cap_appname.$$cap_root_domain

            # Admin
            ADMIN_ACCOUNT: $$cap_admin_user
            ADMIN_PASSWORD: $$cap_admin_pass

            # DB (local)
            USE_MONGODB: 'false'

        volumes:
            - $$cap_appname-data:/opt/meshcentral/meshcentral-data
            - $$cap_appname-files:/opt/meshcentral/meshcentral-files
            - $$cap_appname-backup:/opt/meshcentral/meshcentral-backups

        restart: always

volumes:
    $$cap_appname-data:
    $$cap_appname-files:
    $$cap_appname-backup:

caproverOneClickApp:
    displayName: 'MeshCentral (CapRover Optimized)'
    description: 'MeshCentral server configured for CapRover reverse proxy with automatic TLS offload.'

    documentation: 'https://meshcentral.com/docs/MeshCentral2UserGuide.pdf'

    variables:
        - id: $$cap_admin_user
          label: Admin Username
          defaultValue: admin
          validRegex: /^.+$/

        - id: $$cap_admin_pass
          label: Admin Password
          validRegex: /^.+$/

    instructions:
        start: >
            Deploy MeshCentral with default settings.

        end: >
            IMPORTANT STEPS:

            1. Go to App > HTTP Settings
            2. Enable HTTPS
            3. Enable Force HTTPS
            4. Enable WebSocket Support

            Then open:

            https://$$cap_appname.$$cap_root_domain
