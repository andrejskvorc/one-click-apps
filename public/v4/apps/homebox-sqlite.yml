# <summary>
# CapRover template for Homebox (SQLite only)
# </summary>
captainVersion: 4

services:
    $$cap_appname:
        image: sysadminsmedia/homebox:latest
        containerHttpPort: 7745
        environment:
            HBOX_MODE: '$$cap_hbox_mode'
            HBOX_STORAGE_CONN_STRING: 'file:///data?no_tmp_dir=true'
            HBOX_STORAGE_PREFIX_PATH: 'files'
            HBOX_DATABASE_SQLITE_PATH: '/data/homebox.db?_pragma=busy_timeout=2000&_pragma=journal_mode=WAL&_fk=1&_time_format=sqlite'
            HBOX_OPTIONS_ALLOW_REGISTRATION: 'false'
        volumes:
            - $$cap_appname-data:/data
        restart: always

volumes:
    $$cap_appname-data:

caproverOneClickApp:
    variables:
        - id: '$$cap_hbox_mode'
          label: 'HBOX_MODE'
          defaultValue: 'production'
          description: 'Application mode (production recommended)'
          validRegex: ''

    instructions:
        start: >-
            Deploying Homebox (SQLite mode).
        end: >-
            APP CREATED SUCCESSFULLY (NEXT STEPS):

            1. Go to Apps > $$cap_appname > HTTP Settings.

            2. Enable HTTPS and Force HTTPS.

            3. Ensure Container HTTP Port is set to 7745.

            4. Access Homebox at '$$cap_appname.$$cap_root_domain'.

            5. To create your first user:
               - Go to Apps > $$cap_appname > App Configurations
               - Set HBOX_OPTIONS_ALLOW_REGISTRATION to true
               - Click Save & Restart
               - Register your first account

            6. (Optional - recommended)
               After creating your account:
               - Set HBOX_OPTIONS_ALLOW_REGISTRATION back to false
               - Save & Restart

               IMPORTANT: If registration is disabled before creating a user, you will not be able to access the app.

    displayName: 'Homebox (SQLite)'
    isOfficial: false
    description: 'Homebox – home inventory system using SQLite (simple & reliable setup)'
    documentation: 'https://github.com/sysadminsmedia/homebox'
