# <summary>
# Auto-generated CapRover template for Wordpress with PostgreSQL
# </summary>
captainVersion: 4
services:
    $$cap_appname:
        image: wordpress:latest
        depends_on:
            - $$cap_appname-db
        environment:
            PHPIZE_DEPS: '$$cap_phpize_deps'
            PHP_INI_DIR: '$$cap_php_ini_dir'
            APACHE_CONFDIR: '$$cap_apache_confdir'
            APACHE_ENVVARS: '$$cap_apache_envvars'
            PHP_CFLAGS: '$$cap_php_cflags'
            PHP_CPPFLAGS: '$$cap_php_cppflags'
            PHP_LDFLAGS: '$$cap_php_ldflags'
            GPG_KEYS: '$$cap_gpg_keys'
            PHP_VERSION: '$$cap_php_version'
            PHP_URL: '$$cap_php_url'
            PHP_ASC_URL: '$$cap_php_asc_url'
            PHP_SHA256: '$$cap_php_sha256'
        volumes:
            - $$cap_appname-var/www/html:/var/www/html
    $$cap_appname-db:
        environment:
            POSTGRES_USER: '$$cap_db_user'
            POSTGRES_PASSWORD: '$$cap_db_password'
            POSTGRES_DB: '$$cap_db_name'
        image: postgres:15-alpine
        volumes:
            - $$cap_appname-db-data:/var/lib/mysql
        restart: always
        caproverExtra:
            notExposeAsWebApp: 'true'
volumes:
    $$cap_appname-var/www/html:
    $$cap_appname-db-data:
caproverOneClickApp:
    variables:
        - id: '$$cap_phpize_deps'
          label: 'PHPIZE_DEPS'
          defaultValue: 'autoconf 		dpkg-dev 		file 		g++ 		gcc 		libc-dev 		make 		pkg-config 		re2c'
          description: 'Configuration for PHPIZE_DEPS'
          validRegex: ''
        - id: '$$cap_php_ini_dir'
          label: 'PHP_INI_DIR'
          defaultValue: '/usr/local/etc/php'
          description: 'Configuration for PHP_INI_DIR'
          validRegex: ''
        - id: '$$cap_apache_confdir'
          label: 'APACHE_CONFDIR'
          defaultValue: '/etc/apache2'
          description: 'Configuration for APACHE_CONFDIR'
          validRegex: ''
        - id: '$$cap_apache_envvars'
          label: 'APACHE_ENVVARS'
          defaultValue: '/etc/apache2/envvars'
          description: 'Configuration for APACHE_ENVVARS'
          validRegex: ''
        - id: '$$cap_php_cflags'
          label: 'PHP_CFLAGS'
          defaultValue: '-fstack-protector-strong -fpic -fpie -O2 -D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64'
          description: 'Configuration for PHP_CFLAGS'
          validRegex: ''
        - id: '$$cap_php_cppflags'
          label: 'PHP_CPPFLAGS'
          defaultValue: '-fstack-protector-strong -fpic -fpie -O2 -D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64'
          description: 'Configuration for PHP_CPPFLAGS'
          validRegex: ''
        - id: '$$cap_php_ldflags'
          label: 'PHP_LDFLAGS'
          defaultValue: '-Wl,-O1 -pie'
          description: 'Configuration for PHP_LDFLAGS'
          validRegex: ''
        - id: '$$cap_gpg_keys'
          label: 'GPG_KEYS'
          defaultValue: '1198C0117593497A5EC5C199286AF1F9897469DC C28D937575603EB4ABB725861C0779DC5C0A9DE4 AFD8691FDAEDF03BDF6E460563F15A9B715376CA'
          description: 'Configuration for GPG_KEYS'
          validRegex: ''
        - id: '$$cap_php_version'
          label: 'PHP_VERSION'
          defaultValue: '8.3.30'
          description: 'Configuration for PHP_VERSION'
          validRegex: ''
        - id: '$$cap_php_url'
          label: 'PHP_URL'
          defaultValue: 'https://www.php.net/distributions/php-8.3.30.tar.xz'
          description: 'Configuration for PHP_URL'
          validRegex: ''
        - id: '$$cap_php_asc_url'
          label: 'PHP_ASC_URL'
          defaultValue: 'https://www.php.net/distributions/php-8.3.30.tar.xz.asc'
          description: 'Configuration for PHP_ASC_URL'
          validRegex: ''
        - id: '$$cap_php_sha256'
          label: 'PHP_SHA256'
          defaultValue: '67f084d36852daab6809561a7c8023d130ca07fc6af8fb040684dd1414934d48'
          description: 'Configuration for PHP_SHA256'
          validRegex: ''
        - id: '$$cap_db_user'
          label: 'Database User'
          defaultValue: 'my_user'
        - id: '$$cap_db_password'
          label: 'Database Password'
          defaultValue: '$$cap_gen_random_hex(16)'
        - id: '$$cap_db_name'
          label: 'Database Name'
          defaultValue: 'my_database'
    instructions:
        start: >-
            Deploying Wordpress with PostgreSQL.
        end: >-
            Wordpress with PostgreSQL is successfully deployed!
    displayName: 'Wordpress with PostgreSQL'
    isOfficial: true
    description: 'The WordPress rich content management system can utilize plugins, widgets, and themes. (Supported Architectures: amd64, arm, arm64, 386, ppc64le, riscv64, s390x)'
    documentation: 'Taken from Docker Hub'
