captainVersion: 4
services:
    $$cap_appname:
        image: linuxserver/bookstack:latest
        environment:
            PHP_INI_SCAN_DIR: '$$cap_php_ini_scan_dir'
        volumes:
            - $$cap_appname-config:/config
volumes:
    $$cap_appname-config:
caproverOneClickApp:
    variables:
        - id: '$$cap_php_ini_scan_dir'
          label: 'PHP_INI_SCAN_DIR'
          defaultValue: ':/config/php'
          description: 'Configuration for PHP_INI_SCAN_DIR'
          validRegex: ''
    instructions:
        start: >-
            Deploying Bookstack.
        end: >-
            Bookstack is successfully deployed!
    displayName: 'Bookstack'
    isOfficial: true
    description: ' (Supported Architectures: amd64, arm64)'
    documentation: 'Taken from Docker Hub'
